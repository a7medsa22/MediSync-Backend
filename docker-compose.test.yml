version: '3.9'

services:
  postgres-test:
    image: postgres:15
    container_name: medisync-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: medisync_test
    ports:
      - '5436:5432'
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    container_name: medisync-redis-test
    restart: unless-stopped
    command: redis-server --appendonly no
    ports:
      - '6381:6379'